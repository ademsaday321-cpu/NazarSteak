<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nazar Steak & Kavurma — Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:     #C8822A;
      --amber-lt:  #E8A040;
      --amber-bg:  rgba(200,130,42,0.10);
      --red:       #8B1A1A;
      --bg:        #17120C;
      --surface:   #211A11;
      --surface2:  #2C2318;
      --border:    rgba(200,130,42,0.14);
      --border-md: rgba(200,130,42,0.26);
      --text:      #F0E6D8;
      --text-2:    #9E8A72;
      --text-3:    #5C4E3A;
      --r:         10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════
       LOADER
    ═══════════════════════════════ */
    #loader {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity .55s ease, visibility .55s ease;
    }
    #loader.out { opacity: 0; visibility: hidden; }

    .ld-logo {
      width: 120px; height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 0 22px rgba(200,130,42,.5));
      animation: ld-pulse 2s ease-in-out infinite;
    }
    @keyframes ld-pulse {
      0%,100% { filter: drop-shadow(0 0 14px rgba(200,130,42,.35)); }
      50%      { filter: drop-shadow(0 0 28px rgba(200,130,42,.65)); }
    }

    .ld-track {
      width: 180px; height: 2px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .ld-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--red), var(--amber-lt));
      border-radius: 2px;
      animation: ld-bar 1.8s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes ld-bar { to { width: 100%; } }

    .ld-txt {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    /* ═══════════════════════════════
       HERO HEADER
    ═══════════════════════════════ */
    .hero {
      position: relative;
      height: 260px;
      overflow: hidden;
    }
    .hero-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 40%;
      filter: brightness(.55) saturate(.85);
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        180deg,
        rgba(10,7,3,.25) 0%,
        rgba(10,7,3,.10) 40%,
        rgba(10,7,3,.72) 100%
      );
    }
    .hero-glow {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(0deg, rgba(140,70,10,.45) 0%, transparent 100%);
    }

    .hero-content {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 28px;
      gap: 6px;
    }
    .hero-logo {
      width: 76px; height: 76px;
      object-fit: contain;
      filter: drop-shadow(0 2px 14px rgba(0,0,0,.55));
      margin-bottom: 4px;
    }
    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: .06em;
      text-shadow: 0 2px 12px rgba(0,0,0,.5);
    }
    .hero-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.25rem;
      color: var(--amber-lt);
      letter-spacing: .08em;
      opacity: .9;
    }

    /* ═══════════════════════════════
       SEARCH
    ═══════════════════════════════ */
    .search-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }
    .search-inner {
      max-width: 640px;
      margin: 0 auto;
      position: relative;
    }
    .search-inner svg {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      stroke: var(--text-3);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .search-inner input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px 10px 40px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .88rem;
      font-weight: 300;
      outline: none;
      -webkit-appearance: none;
      transition: border-color .2s;
    }
    .search-inner input::placeholder { color: var(--text-3); }
    .search-inner input:focus { border-color: var(--border-md); }

    /* ═══════════════════════════════
       CATEGORY STRIP
    ═══════════════════════════════ */
    .cats-wrap {
      position: sticky; top: 0; z-index: 100;
      background: rgba(23,18,12,.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .cats-scroll {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 10px;
      gap: 2px;
    }
    .cats-scroll::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0;
      padding: 12px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-3);
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: color .2s, border-color .2s;
    }
    .cat-btn:hover { color: var(--text-2); }
    .cat-btn.active {
      color: var(--amber-lt);
      border-bottom-color: var(--amber);
    }

    /* ═══════════════════════════════
       MAIN / LIST
    ═══════════════════════════════ */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    .cat-section { display: none; }
    .cat-section.visible { display: block; }

    .sec-title {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 30px 16px 12px;
    }
    .sec-title h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }
    .sec-title-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ═══════════════════════════════
       ITEM ROW
    ═══════════════════════════════ */
    .item-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .16s;
    }
    .item-row:first-of-type { border-top: 1px solid var(--border); }
    .item-row:hover  { background: rgba(200,130,42,.05); }
    .item-row:active { background: rgba(200,130,42,.09); }

    .item-thumb {
      width: 68px;
      height: 68px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .item-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .item-thumb-ph {
      width: 28px;
      height: 28px;
      opacity: .18;
      stroke: var(--text);
      fill: none;
      stroke-width: 1.5;
    }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: .93rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }
    .item-sub {
      font-size: .75rem;
      font-weight: 300;
      color: var(--text-3);
      margin-top: 3px;
    }

    .item-price {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--amber-lt);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .item-price-ph {
      width: 52px; height: 16px;
      border-radius: 4px;
      background: var(--surface2);
      flex-shrink: 0;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%,100%{opacity:.3} 50%{opacity:.75}
    }

    .item-chevron {
      width: 13px; height: 13px;
      flex-shrink: 0;
      stroke: var(--text-3);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke .16s;
    }
    .item-row:hover .item-chevron { stroke: var(--amber); }

    /* ═══════════════════════════════
       SKELETON LOADER ROWS
    ═══════════════════════════════ */
    .item-row-skeleton {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .skel-thumb {
      width: 68px; height: 68px;
      border-radius: 8px;
      background: var(--surface2);
      animation: shimmer 1.4s infinite;
      flex-shrink: 0;
    }
    .skel-lines {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .skel-line {
      height: 13px;
      border-radius: 4px;
      background: var(--surface2);
      animation: shimmer 1.4s infinite;
    }
    .skel-line.short { width: 55%; }
    .skel-price {
      width: 52px; height: 16px;
      border-radius: 4px;
      background: var(--surface2);
      animation: shimmer 1.4s infinite;
    }

    #no-results {
      display: none;
      padding: 72px 20px;
      text-align: center;
      font-size: .85rem;
      color: var(--text-3);
      letter-spacing: .05em;
    }
    #no-results.show { display: block; }

    /* ═══════════════════════════════
       MODAL — centered overlay
    ═══════════════════════════════ */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(4,2,1,.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0; visibility: hidden;
      transition: opacity .26s, visibility .26s;
    }
    #overlay.open { opacity: 1; visibility: visible; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      max-height: 92dvh;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      transform: scale(.94) translateY(12px);
      transition: transform .3s cubic-bezier(.22,1,.36,1);
      position: relative;
    }
    #modal::-webkit-scrollbar { display: none; }
    #overlay.open #modal { transform: scale(1) translateY(0); }

    .modal-img-wrap {
      position: relative;
      width: 100%;
      height: 210px;
      background: var(--surface2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .modal-img-wrap img.modal-photo {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .modal-ph-icon {
      width: 56px; height: 56px;
      opacity: .12;
      stroke: var(--text);
      fill: none;
      stroke-width: 1.2;
    }

    .modal-close {
      position: absolute;
      top: 12px; right: 12px;
      width: 32px; height: 32px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 50%;
      color: #fff;
      font-size: .85rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background .2s;
      line-height: 1;
    }
    .modal-close:hover { background: rgba(139,26,26,.75); }

    .modal-body {
      padding: 20px 22px 28px;
    }
    .modal-cat-label {
      font-size: .66rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 6px;
    }
    .modal-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
    }
    .modal-desc {
      font-size: .82rem;
      font-weight: 300;
      color: var(--text-2);
      line-height: 1.6;
      margin-top: 8px;
    }

    .modal-toggle {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .toggle-btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-3);
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .05em;
      cursor: pointer;
      transition: background .18s, color .18s, border-color .18s;
    }
    .toggle-btn:hover { border-color: var(--border-md); color: var(--text-2); }
    .toggle-btn.active {
      background: var(--amber-bg);
      border-color: var(--amber);
      color: var(--amber-lt);
    }

    .modal-rule {
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }
    .modal-price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .modal-price-lbl {
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .modal-price-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--amber-lt);
      transition: opacity .15s;
    }
    .modal-price-val.fade { opacity: 0; }

    /* ═══════════════════════════════
       FOOTER
    ═══════════════════════════════ */
    footer {
      border-top: 1px solid var(--border);
      padding: 18px 20px;
      text-align: center;
      font-size: .7rem;
      letter-spacing: .07em;
      color: var(--text-3);
    }

    @media (min-width: 600px) {
      .hero { height: 320px; }
      .modal-img-wrap { height: 240px; }
    }

    @media (min-width: 760px) {
      .item-thumb { width: 76px; height: 76px; }
      .skel-thumb { width: 76px; height: 76px; }
    }
  </style>
</head>
<body>

<!-- ══ LOADER ══ -->
<div id="loader">
  <img src="logo.png" alt="Nazar" class="ld-logo" />
  <div class="ld-track"><div class="ld-fill"></div></div>
  <div class="ld-txt">Menü hazırlanıyor</div>
</div>

<!-- ══ HERO ══ -->
<header class="hero">
  <img src="içmekan1.jpg" alt="Nazar Steak & Kavurma" class="hero-img" />
  <div class="hero-overlay"></div>
  <div class="hero-glow"></div>
  <div class="hero-content">
    <img src="logo.png" alt="Logo" class="hero-logo" />
    <div class="hero-name">NAZAR STEAK & KAVURMA</div>
    <div class="hero-tagline">Etin En Lezzetli Hali</div>
  </div>
</header>

<!-- ══ SEARCH ══ -->
<div class="search-wrap">
  <div class="search-inner">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    <input id="search" type="search" placeholder="Ürün ara…" autocomplete="off" spellcheck="false" />
  </div>
</div>

<!-- ══ CATEGORY STRIP ══ -->
<div class="cats-wrap">
  <div class="cats-scroll" id="cats-scroll"></div>
</div>

<!-- ══ MAIN ══ -->
<main id="main"></main>
<div id="no-results">Sonuç bulunamadı</div>

<!-- ══ MODAL ══ -->
<div id="overlay">
  <div id="modal" role="dialog" aria-modal="true">
    <div class="modal-img-wrap" id="modal-img-wrap">
      <svg class="modal-ph-icon" viewBox="0 0 64 64">
        <ellipse cx="32" cy="34" rx="22" ry="14"/>
        <path d="M14 28 C18 18 46 18 50 28"/>
        <path d="M22 22 C24 16 40 16 42 22"/>
      </svg>
    </div>
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-body">
      <div class="modal-cat-label" id="modal-cat"></div>
      <div class="modal-name"      id="modal-name"></div>
      <div class="modal-desc"      id="modal-desc"></div>
      <div class="modal-toggle"    id="modal-toggle"></div>
      <div class="modal-rule"></div>
      <div class="modal-price-row">
        <div class="modal-price-lbl">Fiyat</div>
        <div class="modal-price-val" id="modal-price"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ FOOTER ══ -->
<footer>Nazar Steak &amp; Kavurma &nbsp;·&nbsp; Ereğli &nbsp;·&nbsp; Fiyatlara KDV dahildir</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ────────────────────────────────────────
   FIREBASE CONFIG
──────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyDx17iwmc9Wi4Zkx1CkJoQAEbeLA312h7c",
  authDomain: "nazar-et-qr-menu.firebaseapp.com",
  projectId: "nazar-et-qr-menu",
  storageBucket: "nazar-et-qr-menu.firebasestorage.app",
  messagingSenderId: "66531790628",
  appId: "1:66531790628:web:53b3c620224a0666c0edb1"
};

const CACHE_KEY = 'nazarMenu_v1';
const CACHE_TTL = 5 * 60 * 1000; // 5 dakika

/* ────────────────────────────────────────
   PRICE FORMATTER
──────────────────────────────────────── */
function fmt(price) {
  if (!price && price !== 0) return '—';
  const n = Number(price);
  return isNaN(n) ? '—' : n.toLocaleString('tr-TR', { maximumFractionDigits: 0 }) + ' ₺';
}

/* ────────────────────────────────────────
   BUILD DOM
──────────────────────────────────────── */
const allRows = [];
let activeFilter = 'all';

const thumbPh = `<svg class="item-thumb-ph" viewBox="0 0 64 64">
  <ellipse cx="32" cy="36" rx="20" ry="12"/>
  <path d="M14 30 C18 20 46 20 50 30"/>
</svg>`;

function build(categories) {
  const main  = document.getElementById('main');
  const strip = document.getElementById('cats-scroll');

  strip.appendChild(mkBtn('Tümü', 'all', true));

  categories.forEach(({ id, name, items }) => {
    strip.appendChild(mkBtn(name, id, false));

    const sec = document.createElement('section');
    sec.className = 'cat-section';
    sec.dataset.cat = id;

    const hd = document.createElement('div');
    hd.className = 'sec-title';
    hd.innerHTML = `<h2>${name}</h2><div class="sec-title-line"></div>`;
    sec.appendChild(hd);

    (items || []).forEach(item => {
      const row = mkRow(item, name);
      sec.appendChild(row);
      allRows.push({
        el: row,
        cat: id,
        catName: name,
        nl: item.name.toLowerCase(),
        vl: (item.variants || []).map(v => v.label.toLowerCase()).join(' ')
      });
    });

    main.appendChild(sec);
  });

  showCat('all');
}

function mkBtn(label, key, active) {
  const b = document.createElement('button');
  b.className = 'cat-btn' + (active ? ' active' : '');
  b.textContent = label;
  b.dataset.cat = key;
  b.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeFilter = key;
    clearSearch();
    showCat(key);
    b.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  });
  return b;
}

function mkRow(item, catName) {
  const row = document.createElement('div');
  row.className = 'item-row';

  const firstVariant = (item.variants || [])[0];
  let priceCell;
  if (firstVariant && (firstVariant.price || firstVariant.price === 0)) {
    priceCell = `<div class="item-price">${fmt(firstVariant.price)}</div>`;
  } else {
    priceCell = `<div class="item-price-ph"></div>`;
  }

  let thumbHtml;
  if (item.imageUrl) {
    thumbHtml = `<div class="item-thumb"><img src="${item.imageUrl}" alt="${item.name}" loading="lazy" /></div>`;
  } else {
    thumbHtml = `<div class="item-thumb">${thumbPh}</div>`;
  }

  row.innerHTML = `
    ${thumbHtml}
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      ${item.description ? `<div class="item-sub">${item.description}</div>` : ''}
    </div>
    ${priceCell}
    <svg class="item-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;

  row.addEventListener('click', () => openModal(item, catName));
  return row;
}

function rebuildMenu(fresh) {
  document.getElementById('main').innerHTML = '';
  document.getElementById('cats-scroll').innerHTML = '';
  allRows.length = 0;
  activeFilter = 'all';
  build(fresh);
}

/* ────────────────────────────────────────
   FILTER & SEARCH
──────────────────────────────────────── */
function showCat(key) {
  document.querySelectorAll('.cat-section').forEach(s =>
    s.classList.toggle('visible', key === 'all' || s.dataset.cat === key)
  );
  allRows.forEach(r => r.el.style.display = '');
  document.getElementById('no-results').classList.remove('show');
}

document.getElementById('search').addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  if (!q) { showCat(activeFilter); return; }
  document.querySelectorAll('.cat-section').forEach(s => s.classList.add('visible'));
  let found = false;
  allRows.forEach(r => {
    const hit = r.nl.includes(q) || r.vl.includes(q) || r.catName.toLowerCase().includes(q);
    r.el.style.display = hit ? '' : 'none';
    if (hit) found = true;
  });
  document.querySelectorAll('.cat-section').forEach(s => {
    const any = [...s.querySelectorAll('.item-row')].some(x => x.style.display !== 'none');
    s.classList.toggle('visible', any);
  });
  document.getElementById('no-results').classList.toggle('show', !found);
});

function clearSearch() {
  document.getElementById('search').value = '';
  allRows.forEach(r => r.el.style.display = '');
  document.getElementById('no-results').classList.remove('show');
}

/* ────────────────────────────────────────
   MODAL
──────────────────────────────────────── */
function openModal(item, catName) {
  document.getElementById('modal-cat').textContent  = catName;
  document.getElementById('modal-name').textContent = item.name;

  // Description
  const descEl = document.getElementById('modal-desc');
  descEl.textContent = item.description || '';
  descEl.style.display = item.description ? '' : 'none';

  // Image
  const wrap = document.getElementById('modal-img-wrap');
  wrap.innerHTML = '';
  if (item.imageUrl) {
    const img = document.createElement('img');
    img.className = 'modal-photo';
    img.src = item.imageUrl;
    img.alt = item.name;
    wrap.appendChild(img);
  } else {
    wrap.innerHTML = `<svg class="modal-ph-icon" viewBox="0 0 64 64">
      <ellipse cx="32" cy="34" rx="22" ry="14"/>
      <path d="M14 28 C18 18 46 18 50 28"/>
      <path d="M22 22 C24 16 40 16 42 22"/>
    </svg>`;
  }

  // Toggle buttons
  const toggleWrap = document.getElementById('modal-toggle');
  toggleWrap.innerHTML = '';
  const priceEl = document.getElementById('modal-price');

  function setPrice(price) {
    priceEl.textContent = fmt(price);
  }

  const variants = item.variants || [];
  if (variants.length > 1) {
    toggleWrap.style.display = 'flex';
    variants.forEach((v, i) => {
      const btn = document.createElement('button');
      btn.className = 'toggle-btn' + (i === 0 ? ' active' : '');
      btn.textContent = v.label;
      btn.addEventListener('click', () => {
        toggleWrap.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        priceEl.classList.add('fade');
        setTimeout(() => {
          setPrice(v.price);
          priceEl.classList.remove('fade');
        }, 130);
      });
      toggleWrap.appendChild(btn);
    });
    setPrice(variants[0].price);
  } else {
    toggleWrap.style.display = 'none';
    setPrice(variants[0] ? variants[0].price : null);
  }

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ────────────────────────────────────────
   SKELETON
──────────────────────────────────────── */
function showSkeletons(count = 6) {
  const main = document.getElementById('main');
  for (let i = 0; i < count; i++) {
    const sk = document.createElement('div');
    sk.className = 'item-row-skeleton';
    sk.innerHTML = `
      <div class="skel-thumb"></div>
      <div class="skel-lines">
        <div class="skel-line"></div>
        <div class="skel-line short"></div>
      </div>
      <div class="skel-price"></div>`;
    main.appendChild(sk);
  }
}

function removeSkeletons() {
  document.querySelectorAll('.item-row-skeleton').forEach(el => el.remove());
}

/* ────────────────────────────────────────
   LOADER HIDE
──────────────────────────────────────── */
function hideLoader(delay = 400) {
  setTimeout(() => {
    const ld = document.getElementById('loader');
    if (!ld) return;
    ld.classList.add('out');
    ld.addEventListener('transitionend', () => ld.remove(), { once: true });
  }, delay);
}

/* ────────────────────────────────────────
   FIRESTORE
──────────────────────────────────────── */
async function loadFromFirestore(db) {
  const snap = await getDocs(collection(db, 'categories'));
  const cats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  cats.sort((a, b) => (a.order ?? 99) - (b.order ?? 99));
  return cats;
}

/* ────────────────────────────────────────
   INIT
──────────────────────────────────────── */
async function init() {
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // Cache kontrolü
  let cached = null;
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Date.now() - parsed.ts < CACHE_TTL) cached = parsed.data;
    }
  } catch(e) {}

  if (cached) {
    build(cached);
    hideLoader(300);
    // Arka planda taze veri çek — değişmişse güncelle
    loadFromFirestore(db).then(fresh => {
      if (JSON.stringify(fresh) !== JSON.stringify(cached)) {
        rebuildMenu(fresh);
      }
      localStorage.setItem(CACHE_KEY, JSON.stringify({ data: fresh, ts: Date.now() }));
    }).catch(err => console.warn('Firestore arka plan güncelleme:', err));
  } else {
    showSkeletons();
    try {
      const cats = await loadFromFirestore(db);
      localStorage.setItem(CACHE_KEY, JSON.stringify({ data: cats, ts: Date.now() }));
      removeSkeletons();
      build(cats);
    } catch(e) {
      console.error('Firestore yüklenemedi:', e);
      removeSkeletons();
    }
    hideLoader(400);
  }
}

init();
</script>
